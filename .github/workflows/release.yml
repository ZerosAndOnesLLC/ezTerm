name: release

# Push a tag starting with `v` (e.g. `v0.14.0`) to kick off a release,
# or trigger manually from the Actions tab. Builds portable tar.xz
# archives for every target plus MSI + NSIS (Windows) and AppImage +
# deb (Linux) installers for in-app auto-update via
# tauri-plugin-updater. Updater installer artifacts are minisign-signed
# when TAURI_SIGNING_PRIVATE_KEY is available as a repo secret.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# No workflow-level permissions block. Each job declares the minimum
# scope it needs (build = read; release / prune = write). Limits the
# blast radius if the build job's secret-handling steps ever go sideways.

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: ezterm.exe
            bundles: "msi nsis"
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: ezterm
            bundles: "appimage deb"
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bin_name: ezterm
            bundles: "appimage deb"
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bin_name: ezterm
            bundles: "app"

    steps:
      - uses: actions/checkout@v5

      # Cargo.toml is the single source of truth for the version (Ron bumps
      # it before each tag). Propagate that value into tauri.conf.json and
      # ui/package.json so the bundler names installers correctly and the
      # MSI / NSIS embed the right product version (otherwise Windows
      # Installer refuses to upgrade across releases). On tag pushes, the
      # tag wins in case of any mismatch.
      - name: Sync bundle version from tag / Cargo.toml
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME:-}" =~ ^v[0-9] ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER=$(grep -m1 -E '^version\s*=' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          fi
          echo "Bundle version → $VER"
          tmp=$(mktemp)
          jq --arg v "$VER" '.version = $v' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json
          tmp=$(mktemp)
          jq --arg v "$VER" '.version = $v' ui/package.json > "$tmp" && mv "$tmp" ui/package.json
          echo "--- tauri.conf.json ---"; jq -r '.version' src-tauri/tauri.conf.json
          echo "--- ui/package.json  ---"; jq -r '.version' ui/package.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      # Install the Tauri CLI as a pre-built binary (far faster than
      # `cargo install`) so we can invoke `cargo tauri build` for the
      # platforms that need installer bundles.
      - name: Install Tauri CLI
        if: matrix.bundles != ''
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      # Tauri v2 needs webkit2gtk 4.1 + a handful of X / desktop libs on
      # Linux. Native arm64 runner has the same apt repos as x86_64 so a
      # single step covers both Ubuntu targets.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl wget file xz-utils patchelf \
            fuse libfuse2 desktop-file-utils \
            minisign

      - name: Build UI (Next.js static export)
        run: |
          npm --prefix ui ci
          npm --prefix ui run build

      # Windows: pull VcXsrv via Chocolatey (preinstalled on windows-latest)
      # and stage it at `src-tauri/vcxsrv/` so:
      # 1. The Tauri bundler picks it up as a resource (see
      #    `tauri.windows.conf.json`) and ships it inside MSI / NSIS.
      # 2. The portable tar.xz packaging step below copies the same tree
      #    next to `ezterm.exe` — single source, two layouts.
      #
      # SourceForge mirrors have become unreliable for direct download
      # from CI (redirect interstitials + rate-limited mirrors); Chocolatey
      # pulls the signed installer from their own cache.
      - name: Stage VcXsrv for bundling (Windows only)
        if: matrix.name == 'windows-x86_64'
        shell: pwsh
        run: |
          choco install vcxsrv -y --no-progress --limit-output
          if (-not (Test-Path 'C:\Program Files\VcXsrv\vcxsrv.exe')) {
            Write-Error 'VcXsrv install missing vcxsrv.exe'
            exit 1
          }
          New-Item -ItemType Directory -Force -Path 'src-tauri\vcxsrv' | Out-Null
          Copy-Item 'C:\Program Files\VcXsrv\*' 'src-tauri\vcxsrv\' -Recurse -Force
          Write-Host "Staged VcXsrv size: $((Get-ChildItem 'src-tauri\vcxsrv' -Recurse | Measure-Object -Sum Length).Sum) bytes"

      # Two build modes. Platforms with bundles (Windows / Linux / macOS)
      # go through `cargo tauri build` so the installer bundler runs and
      # produces the updater artifacts (.app.tar.gz on macOS, .AppImage
      # on Linux, .msi/.exe on Windows). The .app is ad-hoc-signed; we
      # don't notarise yet, so first launch needs right-click → Open.
      - name: Build release binary + installer bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.bundles }}" ]; then
            cargo tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      # Tauri's bundler signs the AppImage and macOS .app.tar.gz
      # automatically when TAURI_SIGNING_PRIVATE_KEY is set, but it
      # does NOT sign .deb files. Sign them here with the same key so
      # the updater plugin can verify them on Linux deb installs.
      - name: Sign .deb files (Linux only)
        if: runner.os == 'Linux' && matrix.bundles != ''
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY not set — skipping .deb signing"
            exit 0
          fi
          DEB_DIR="target/${{ matrix.target }}/release/bundle/deb"
          if [ ! -d "$DEB_DIR" ]; then
            echo "no deb bundle dir at $DEB_DIR — nothing to sign"
            exit 0
          fi
          # Stage the secret to a real file so minisign can mmap it
          # (process substitution doesn't survive minisign's reopen-on-EOF
          # behavior on the secret-key path). trap EXIT guarantees the
          # tempfile is removed even if the job is cancelled mid-loop.
          KEY_FILE=$(mktemp)
          trap 'rm -f "$KEY_FILE"' EXIT
          chmod 600 "$KEY_FILE"
          # TAURI_SIGNING_PRIVATE_KEY is conventionally stored base64-
          # encoded in CI secrets (matches the encoding of the `pubkey`
          # field in tauri.conf.json). Auto-detect: real minisign key
          # files start with "untrusted comment:" — if that's what we
          # see, write as-is; otherwise base64-decode before writing.
          if [[ "${TAURI_SIGNING_PRIVATE_KEY}" == untrusted* ]]; then
            printf '%s' "${TAURI_SIGNING_PRIVATE_KEY}" > "$KEY_FILE"
          else
            printf '%s' "${TAURI_SIGNING_PRIVATE_KEY}" | base64 -d > "$KEY_FILE"
          fi
          for deb in "$DEB_DIR"/*.deb; do
            [ -f "$deb" ] || continue
            base=$(basename "$deb")
            ts=$(date +%s)
            # Pipe the password to stdin so minisign doesn't try a tty
            # prompt. Trusted-comment matches the convention Tauri uses
            # on its sigs: timestamp + file basename, tab-separated.
            printf '%s\n' "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" \
              | minisign -S \
                  -s "$KEY_FILE" \
                  -t "timestamp:${ts}	file:${base}" \
                  -m "$deb" \
                  -x "${deb}.sig"
            echo "signed: ${deb}.sig"
          done

      - name: Package portable tar.xz + collect installers
        shell: bash
        run: |
          set -euo pipefail
          STAGE="stage/ezterm-${{ matrix.name }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "$STAGE/"
          cp README.md "$STAGE/"
          if [ -f LICENSE ]; then cp LICENSE "$STAGE/"; fi
          if [ "${{ matrix.name }}" = "windows-x86_64" ]; then
            # VcXsrv is already staged at src-tauri/vcxsrv/ by the
            # "Stage VcXsrv for bundling" step (so the Tauri bundler
            # picks it up). Mirror that tree into the tarball so the
            # portable build has it next to ezterm.exe too.
            mkdir -p "$STAGE/vcxsrv"
            cp -r src-tauri/vcxsrv/. "$STAGE/vcxsrv/"
          fi
          tar -C stage -cJf "ezterm-${{ matrix.name }}.tar.xz" "ezterm-${{ matrix.name }}"
          ls -l "ezterm-${{ matrix.name }}.tar.xz"

          # Copy installer bundles (+ .sig files produced by the tauri
          # bundler when signing is configured) into a flat directory so
          # the release job can upload them by glob.
          mkdir -p installers
          BUNDLE_DIR="target/${{ matrix.target }}/release/bundle"
          if [ -d "$BUNDLE_DIR" ]; then
            find "$BUNDLE_DIR" -maxdepth 2 \( \
              -name '*.msi' -o -name '*.msi.sig' -o \
              -name '*-setup.exe' -o -name '*-setup.exe.sig' -o \
              -name '*.nsis.zip' -o -name '*.nsis.zip.sig' -o \
              -name '*.AppImage' -o -name '*.AppImage.sig' -o \
              -name '*.deb' -o -name '*.deb.sig' -o \
              -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \
              \) -print0 | xargs -0 -I {} cp -v {} installers/ || true
          fi
          echo "--- installers collected ---"
          ls -la installers/ || true

      - name: Upload portable artifact
        uses: actions/upload-artifact@v5
        with:
          name: portable-${{ matrix.name }}
          path: ezterm-${{ matrix.name }}.tar.xz
          if-no-files-found: error
          retention-days: 7

      - name: Upload installer artifacts
        if: matrix.bundles != ''
        uses: actions/upload-artifact@v5
        with:
          name: installers-${{ matrix.name }}
          path: installers/
          if-no-files-found: warn
          retention-days: 7

  release:
    name: publish draft release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: |
          set -euo pipefail
          # Only hash the user-facing archives + installers, not the .sig files.
          shopt -s nullglob
          sha256sum *.tar.xz *.msi *.exe *.AppImage *.deb 2>/dev/null > SHA256SUMS || true
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS || true

      # Build a tauri-plugin-updater manifest (`latest.json`) from the
      # installer artifacts + their .sig files. One platform entry per
      # signed installer we found.
      - name: Generate latest.json updater manifest
        working-directory: artifacts
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          notes_file="../docs/release-notes/${TAG}.md"
          notes=""
          if [ -f "$notes_file" ]; then
            notes=$(head -c 4000 "$notes_file")
          fi
          pub_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          base="https://github.com/${REPO}/releases/download/${TAG}"

          # Build the platforms object via jq with --arg for every value
          # so signatures and URLs go through proper JSON escaping (no
          # shell-level sed for quotes — defense in depth even though
          # minisign output is base64). Per-installer entries (e.g.
          # linux-x86_64-deb) are what the updater plugin's get_urls()
          # looks up first based on the binary's __TAURI_BUNDLE_TYPE
          # constant. The bare linux-{arch} fallbacks come first within
          # each arch block, matching the spec's sample manifest order.
          platforms='{}'
          for pair in \
            "windows-x86_64:*-setup.exe" \
            "linux-x86_64:*_amd64.AppImage" \
            "linux-x86_64-appimage:*_amd64.AppImage" \
            "linux-x86_64-deb:*_amd64.deb" \
            "linux-aarch64:*_aarch64.AppImage" \
            "linux-aarch64-appimage:*_aarch64.AppImage" \
            "linux-aarch64-deb:*_arm64.deb" \
            "darwin-aarch64:*.app.tar.gz" \
          ; do
            plat="${pair%%:*}"
            glob="${pair#*:}"
            # shellcheck disable=SC2086
            installer=$(ls $glob 2>/dev/null | head -n1 || true)
            if [ -z "$installer" ]; then continue; fi
            sig_file="${installer}.sig"
            if [ ! -f "$sig_file" ]; then
              echo "skip $plat — no signature for $installer (signing secret missing?)"
              continue
            fi
            sig=$(tr -d '\n' < "$sig_file")
            url="${base}/${installer}"
            platforms=$(jq --arg p "$plat" --arg u "$url" --arg s "$sig" \
              '. + {($p): {url: $u, signature: $s}}' <<< "$platforms")
          done

          if [ "$platforms" = '{}' ]; then
            echo "No signed installers found — skipping latest.json."
            exit 0
          fi

          jq -n \
            --arg v "$version" \
            --arg n "$notes" \
            --arg d "$pub_date" \
            --argjson p "$platforms" \
            '{version:$v, notes:$n, pub_date:$d, platforms:$p}' \
            > latest.json
          echo "--- latest.json ---"
          cat latest.json

      # Cross-check: every URL in latest.json must resolve to a file in
      # artifacts/. Catches cases where the manifest builder, asset
      # collector, and release-create asset list drift apart — exactly
      # the failure mode that produced #36 (manifest pointed at
      # AppImage, deb users tried to install_deb(AppImage_bytes)).
      - name: Verify manifest URLs resolve to uploaded assets
        working-directory: artifacts
        run: |
          set -euo pipefail
          if [ ! -f latest.json ]; then
            echo "no latest.json — nothing to verify"
            exit 0
          fi
          missing=()
          while IFS= read -r url; do
            asset="${url##*/}"
            if [ ! -f "$asset" ]; then
              missing+=("$asset")
            fi
          done < <(jq -r '.platforms | to_entries[] | .value.url' latest.json)
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::manifest references missing assets: ${missing[*]}"
            echo "--- latest.json ---"
            cat latest.json
            echo "--- artifacts/ ---"
            ls -la
            exit 1
          fi
          echo "✓ all $(jq '.platforms | length' latest.json) manifest URLs resolve"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="docs/release-notes/${TAG}.md"
          ASSETS=$(ls artifacts/*.tar.xz artifacts/SHA256SUMS 2>/dev/null)
          # Include installers + their sigs + manifest when present.
          for f in artifacts/*.msi artifacts/*.msi.sig \
                   artifacts/*-setup.exe artifacts/*-setup.exe.sig \
                   artifacts/*.AppImage artifacts/*.AppImage.sig \
                   artifacts/*.deb artifacts/*.deb.sig \
                   artifacts/*.app.tar.gz artifacts/*.app.tar.gz.sig \
                   artifacts/latest.json; do
            [ -f "$f" ] && ASSETS="$ASSETS $f"
          done
          if [ -f "$NOTES_FILE" ]; then
            echo "Using notes from $NOTES_FILE"
            # shellcheck disable=SC2086
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              --draft \
              $ASSETS
          else
            echo "No $NOTES_FILE — falling back to --generate-notes"
            # shellcheck disable=SC2086
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --draft \
              $ASSETS
          fi

  prune:
    name: prune old releases
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    env:
      # Bump this to keep more (or fewer) releases. Counts every release
      # GitHub knows about, drafts and prereleases included.
      RELEASES_TO_KEEP: 20
    steps:
      - name: Delete releases + tags beyond the cap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:  ${{ github.repository }}
        run: |
          set -euo pipefail
          KEEP="${RELEASES_TO_KEEP}"

          # List every release the repo has (drafts + prereleases included),
          # sort newest first by created_at, then take everything past index
          # KEEP — those are the tags to delete. --limit is generous; we
          # never expect to be near it but it costs nothing.
          mapfile -t TO_DELETE < <(
            gh release list --limit 1000 \
              --json tagName,createdAt,isDraft,isPrerelease \
              | jq -r --argjson keep "$KEEP" '
                  sort_by(.createdAt) | reverse | .[$keep:] | .[].tagName
                '
          )

          TOTAL=$(gh release list --limit 1000 --json tagName --jq 'length')
          echo "Releases on repo: $TOTAL"
          echo "Keeping newest:   $KEEP"
          echo "To delete:        ${#TO_DELETE[@]}"

          if [ "${#TO_DELETE[@]}" -eq 0 ]; then
            echo "Nothing to prune."
            exit 0
          fi

          for tag in "${TO_DELETE[@]}"; do
            [ -z "$tag" ] && continue
            # --cleanup-tag also deletes the underlying git tag so we don't
            # accumulate orphan tags. --yes skips the confirmation prompt.
            echo "Deleting release + tag: $tag"
            gh release delete "$tag" --cleanup-tag --yes
          done

          echo "Prune complete."
