name: release

# Push a tag starting with `v` (e.g. `v0.11.0`) to kick off a release,
# or trigger manually from the Actions tab. The workflow produces one
# `tar.xz` archive per target platform and attaches them to a draft
# GitHub Release that you review + publish by hand.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: ezterm.exe
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: ezterm
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bin_name: ezterm
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bin_name: ezterm

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      # Tauri v2 needs webkit2gtk 4.1 + a handful of X / desktop libs on
      # Linux. Native arm64 runner has the same apt repos as x86_64 so a
      # single step covers both Ubuntu targets.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl wget file xz-utils patchelf

      - name: Build UI (Next.js static export)
        run: |
          npm --prefix ui ci
          npm --prefix ui run build

      # Raw cargo build — NOT cargo tauri build. tauri-build embeds the
      # static UI into the binary via an OUT_DIR include, so the produced
      # executable is self-contained. Skipping the MSI/DMG/AppImage
      # bundles keeps the archive small and honours the tar.xz request.
      - name: Build release binary
        working-directory: src-tauri
        run: cargo build --release --target ${{ matrix.target }}

      # Windows release ships VcXsrv (GPLv2, mere aggregation) so "extract
      # and run" supports X11 forwarding out of the box. Uses the official
      # installer from SourceForge and extracts its NSIS payload with 7z
       # (pre-installed on windows-latest). Failures are fatal — a release
      # that silently skipped VcXsrv would mislead users.
      - name: Bundle VcXsrv (Windows only)
        if: matrix.name == 'windows-x86_64'
        shell: bash
        env:
          VCXSRV_URL: "https://sourceforge.net/projects/vcxsrv/files/vcxsrv/1.20.14.0/vcxsrv-64.1.20.14.0.installer.exe/download"
        run: |
          set -euo pipefail
          curl -L --retry 3 --retry-delay 5 -A "Mozilla/5.0" -o vcxsrv-installer.exe "$VCXSRV_URL"
          # 7z is pre-installed on windows-latest. -aos skips overwriting
          # duplicate-name entries (NSIS installers sometimes emit them).
          7z x vcxsrv-installer.exe -ovcxsrv-extracted -y -aos > /dev/null
          test -f vcxsrv-extracted/vcxsrv.exe
          echo "vcxsrv-extracted ready:"
          ls vcxsrv-extracted | head -20

      - name: Package as tar.xz
        shell: bash
        run: |
          set -euo pipefail
          # Workspace target dir lives at the repo root — cargo is
          # workspace-aware, so building from src-tauri/ still writes
          # here, NOT into src-tauri/target/.
          STAGE="stage/ezterm-${{ matrix.name }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "$STAGE/"
          cp README.md "$STAGE/"
          # Include the licence in each archive so the tarball is
          # self-describing for redistribution.
          if [ -f LICENSE ]; then cp LICENSE "$STAGE/"; fi
          # Windows: drop the extracted VcXsrv tree into a /vcxsrv/ subdir
          # of the stage. XServerManager::detect_install_path checks there
          # first before falling back to %ProgramFiles%\VcXsrv\.
          if [ "${{ matrix.name }}" = "windows-x86_64" ]; then
            mkdir -p "$STAGE/vcxsrv"
            cp -r vcxsrv-extracted/. "$STAGE/vcxsrv/"
          fi
          tar -C stage -cJf "ezterm-${{ matrix.name }}.tar.xz" "ezterm-${{ matrix.name }}"
          ls -l "ezterm-${{ matrix.name }}.tar.xz"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ezterm-${{ matrix.name }}
          path: ezterm-${{ matrix.name }}.tar.xz
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish draft release
    needs: build
    runs-on: ubuntu-latest
    # Only actually cut a release on tag pushes. workflow_dispatch runs
    # still produce artifacts (attached to the workflow run) so you can
    # iterate on the build without minting draft releases.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      # Combined manifest so users can verify the whole release in one
      # `sha256sum -c SHA256SUMS` pass. GitHub already displays per-asset
      # SHA256 on the release page, so no per-file detached hashes.
      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum *.tar.xz > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="docs/release-notes/${TAG}.md"
          # If a tag-specific notes file is committed to the repo, use it
          # verbatim; otherwise fall back to GitHub's auto-generated
          # commit-log summary so the release isn't blocked on notes.
          if [ -f "$NOTES_FILE" ]; then
            echo "Using notes from $NOTES_FILE"
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              --draft \
              artifacts/*.tar.xz \
              artifacts/SHA256SUMS
          else
            echo "No $NOTES_FILE — falling back to --generate-notes"
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --draft \
              artifacts/*.tar.xz \
              artifacts/SHA256SUMS
          fi
