<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<title>ezTerm — New session</title>
<link rel="stylesheet" href="mockups.css">
</head>
<body>
<div class="app">
  <div class="app-body">

    <aside class="sidebar">
      <div class="sidebar-header"><span>Sessions</span></div>
      <div class="tree">
        <div class="tree-row folder" style="padding-left: 8px;"><span class="chev">&#9662;</span><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6 14h15l-3 7H3l3-7z"/><path d="M22 12V6a2 2 0 0 0-2-2h-8l-2-3H4a2 2 0 0 0-2 2v11"/></svg><span class="name">production</span></div>
        <div class="tree-row session" style="padding-left: 28px;"><span class="dot" style="background: #e4c76f;"></span><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg><span class="name">prod-web-01</span></div>
      </div>
      <div class="sidebar-footer"><button class="btn btn-primary btn-full">New session</button></div>
    </aside>

    <main class="main">
      <div class="tabs">
        <span style="padding: 0 10px; font-size: 12px; color: rgb(var(--muted)); align-self: center;">No open tabs</span>
      </div>
      <div class="content"><div class="empty-state"><p>Terminal area</p></div></div>
    </main>

  </div>

  <footer class="statusbar">
    <span class="s-ok"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>Vault unlocked</span>
    <span class="spacer"></span>
    <button class="status-btn">Light</button>
    <button class="status-btn">Lock</button>
  </footer>
</div>

<!-- Dialog -->
<div class="dialog-backdrop">
  <form class="dialog" onsubmit="return false" role="dialog" aria-modal="true" aria-labelledby="dlg-title">
    <h2 id="dlg-title">New session</h2>

    <div class="field">
      <label for="f-name">Name</label>
      <input id="f-name" class="input" value="prod-web-03" placeholder="my-server">
    </div>

    <div class="field">
      <label for="f-folder">Folder</label>
      <select id="f-folder" class="select">
        <option>(root)</option>
        <option selected>production</option>
        <option>&nbsp;&nbsp;bastion</option>
        <option>staging</option>
        <option>homelab</option>
      </select>
    </div>

    <div class="row row-2">
      <div class="field">
        <label for="f-host">Host</label>
        <input id="f-host" class="input mono" value="10.20.0.16">
      </div>
      <div class="field">
        <label for="f-port">Port</label>
        <input id="f-port" class="input mono" type="number" value="22">
      </div>
    </div>

    <div class="field">
      <label for="f-user">Username</label>
      <input id="f-user" class="input mono" value="rmcc">
    </div>

    <div class="field">
      <label>Authentication</label>
      <div class="seg" role="radiogroup" aria-label="Authentication method">
        <div class="seg-item" role="radio" aria-checked="false">SSH agent</div>
        <div class="seg-item active" role="radio" aria-checked="true">Password</div>
        <div class="seg-item" role="radio" aria-checked="false">Private key</div>
      </div>
    </div>

    <div class="field">
      <label for="f-cred">Credential</label>
      <select id="f-cred" class="select">
        <option value="">&mdash; choose credential &mdash;</option>
        <option selected>prod-web / rmcc</option>
        <option>db-admin</option>
        <option>ansible-bot</option>
      </select>
      <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2px;">
        <span style="font-size: 11px; color: rgb(var(--muted));">3 saved passwords available</span>
        <button type="button" style="background: transparent; border: 0; color: rgb(var(--accent)); font: inherit; font-size: 11px; cursor: pointer; padding: 0;">+ New credential</button>
      </div>
    </div>

    <!-- Inline new-credential card (open) -->
    <div style="border: 1px solid rgb(var(--border)); border-radius: 2px; background: rgb(var(--surface-2)); padding: 10px; display: flex; flex-direction: column; gap: 8px;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 11px; font-weight: 600; color: rgb(var(--muted)); text-transform: uppercase; letter-spacing: 0.04em;">New password credential</span>
        <button type="button" class="icon-btn" aria-label="Close"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="field">
        <label for="c-label">Label</label>
        <input id="c-label" class="input" placeholder="prod-web / rmcc" value="prod-web / rmcc">
      </div>
      <div class="field">
        <label for="c-secret">Password</label>
        <div style="position: relative;">
          <input id="c-secret" class="input mono" type="password" value="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" style="padding-right: 32px;">
          <button type="button" aria-label="Show password" class="icon-btn" style="position: absolute; top: 50%; right: 4px; transform: translateY(-50%);"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <div style="display: flex; justify-content: flex-end; gap: 6px;">
        <button type="button" class="btn btn-ghost" style="height: 26px; font-size: 11px;">Cancel</button>
        <button type="button" class="btn btn-primary" style="height: 26px; font-size: 11px;">Save credential</button>
      </div>
    </div>

    <div class="row" style="grid-template-columns: auto 1fr;">
      <div class="field">
        <label>Tab color</label>
        <div class="swatches">
          <div class="swatch" style="background: #888;"></div>
          <div class="swatch" style="background: #57c47a;"></div>
          <div class="swatch selected" style="background: #e4c76f;"></div>
          <div class="swatch" style="background: #6aa6ff;"></div>
          <div class="swatch" style="background: #d670d7;"></div>
          <div class="swatch" style="background: #e74856;"></div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-ghost">Cancel</button>
      <button type="submit" class="btn btn-primary">Create session</button>
    </div>
  </form>
</div>
</body>
</html>
