<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<title>ezTerm — Edit session</title>
<link rel="stylesheet" href="mockups.css">
</head>
<body>
<div class="app">
  <div class="app-body">

    <aside class="sidebar">
      <div class="sidebar-header"><span>Sessions</span></div>
      <div class="tree">
        <div class="tree-row folder" style="padding-left: 8px;"><span class="chev">&#9662;</span><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6 14h15l-3 7H3l3-7z"/><path d="M22 12V6a2 2 0 0 0-2-2h-8l-2-3H4a2 2 0 0 0-2 2v11"/></svg><span class="name">bastion</span></div>
        <div class="tree-row session selected" style="padding-left: 28px;"><span class="dot" style="background: #e74856;"></span><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg><span class="name">bastion-east</span></div>
      </div>
      <div class="sidebar-footer"><button class="btn btn-primary btn-full">New session</button></div>
    </aside>

    <main class="main">
      <div class="tabs"><span style="padding: 0 10px; font-size: 12px; color: rgb(var(--muted)); align-self: center;">No open tabs</span></div>
      <div class="content"><div class="empty-state"><p>Terminal area</p></div></div>
    </main>

  </div>

  <footer class="statusbar">
    <span class="s-ok"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>Vault unlocked</span>
    <span class="spacer"></span>
    <button class="status-btn">Lock</button>
  </footer>
</div>

<!-- Edit dialog with private key auth -->
<div class="dialog-backdrop">
  <form class="dialog" onsubmit="return false" role="dialog" aria-modal="true" aria-labelledby="dlg-title">
    <div style="display: flex; align-items: center; justify-content: space-between;">
      <h2 id="dlg-title">Edit session</h2>
      <span style="font-size: 11px; color: rgb(var(--muted)); font-family: var(--font-mono);">id: 14</span>
    </div>

    <div class="field">
      <label for="f-name">Name</label>
      <input id="f-name" class="input" value="bastion-east">
    </div>

    <div class="field">
      <label for="f-folder">Folder</label>
      <select id="f-folder" class="select">
        <option>(root)</option>
        <option>production</option>
        <option selected>&nbsp;&nbsp;bastion</option>
        <option>staging</option>
        <option>homelab</option>
      </select>
    </div>

    <div class="row row-2">
      <div class="field">
        <label for="f-host">Host</label>
        <input id="f-host" class="input mono" value="bastion.int.corp.example">
      </div>
      <div class="field">
        <label for="f-port">Port</label>
        <input id="f-port" class="input mono" type="number" value="22022">
      </div>
    </div>

    <div class="field">
      <label for="f-user">Username</label>
      <input id="f-user" class="input mono" value="rmcc">
    </div>

    <div class="field">
      <label>Authentication</label>
      <div class="seg" role="radiogroup" aria-label="Authentication method">
        <div class="seg-item" role="radio" aria-checked="false">SSH agent</div>
        <div class="seg-item" role="radio" aria-checked="false">Password</div>
        <div class="seg-item active" role="radio" aria-checked="true">Private key</div>
      </div>
    </div>

    <div class="field">
      <label for="f-cred">Private key</label>
      <select id="f-cred" class="select">
        <option value="">&mdash; choose key &mdash;</option>
        <option selected>id_ed25519 (bastion)</option>
        <option>id_rsa-personal</option>
        <option>ansible-deploy-key</option>
      </select>
      <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2px;">
        <span style="font-size: 11px; color: rgb(var(--muted)); display: inline-flex; align-items: center; gap: 6px;">
          <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
          ed25519 &middot; SHA256:hNOL&hellip;4Y2k
        </span>
        <button type="button" style="background: transparent; border: 0; color: rgb(var(--accent)); font: inherit; font-size: 11px; cursor: pointer; padding: 0;">+ New credential</button>
      </div>
    </div>

    <div class="field">
      <label for="f-passphrase">Key passphrase <span style="color: rgb(var(--muted)); font-weight: 400;">(optional)</span></label>
      <select id="f-passphrase" class="select">
        <option>&mdash; none &mdash;</option>
        <option selected>bastion key passphrase</option>
      </select>
    </div>

    <div class="row" style="grid-template-columns: auto 1fr;">
      <div class="field">
        <label>Tab color</label>
        <div class="swatches">
          <div class="swatch" style="background: #888;"></div>
          <div class="swatch" style="background: #57c47a;"></div>
          <div class="swatch" style="background: #e4c76f;"></div>
          <div class="swatch" style="background: #6aa6ff;"></div>
          <div class="swatch" style="background: #d670d7;"></div>
          <div class="swatch selected" style="background: #e74856;"></div>
        </div>
      </div>
    </div>

    <div class="callout">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <div>
        Host key last verified <b>42 days ago</b> (SHA256:wK1b&hellip;Ax9d).
        ezTerm will reject any mismatch on the next connect.
      </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 4px;">
      <button type="button" class="btn btn-ghost" style="border-color: rgb(var(--danger)); color: rgb(var(--danger));">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        Delete
      </button>
      <div style="display: flex; gap: 8px;">
        <button type="button" class="btn btn-ghost">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </div>
  </form>
</div>
</body>
</html>
