<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<title>ezTerm — Unlock</title>
<link rel="stylesheet" href="mockups.css">
</head>
<body>
<main class="unlock">
  <form class="unlock-card" onsubmit="return false">
    <div class="logo">
      <svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      ezTerm
      <span style="color: rgb(var(--muted)); font-weight: 400; font-size: 12px;">v0.1.0</span>
    </div>

    <h1>Unlock ezTerm</h1>
    <p>
      Enter your master password to unlock the credential vault.
      Saved sessions remain listed while locked, but cannot be connected.
    </p>

    <div class="field">
      <label for="pw">Master password</label>
      <div style="position: relative;">
        <input id="pw" class="input" type="password" value="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autofocus style="padding-right: 32px;">
        <button type="button" aria-label="Show password" class="icon-btn" style="position: absolute; top: 50%; right: 4px; transform: translateY(-50%);">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-full" style="height: 34px; font-size: 13px;">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
      Unlock
    </button>

    <div style="display: flex; justify-content: space-between; font-size: 11px; color: rgb(var(--muted));">
      <span>Vault: <span class="input mono" style="display: inline; padding: 0; background: transparent; border: 0; font-size: 11px;">C:\Users\rmcc\AppData\Roaming\ezTerm\vault.db</span></span>
    </div>
  </form>
</main>
</body>
</html>
